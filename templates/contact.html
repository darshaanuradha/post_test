{% extends "layout.html" %}
{% block title %}
  Contact Us
{% endblock title %}
{% block content %}
  <div class="min-h-screen bg-gray-50 py-8 px-4 sm:py-12">
    <div class="max-w-sm mx-auto bg-white rounded-lg shadow-md p-6 sm:p-8">
      <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-4 sm:mb-6">Contact Us</h1>
      <form method="post" class="space-y-4 sm:space-y-5">
        {% csrf_token %}
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Name</label>
          <input type="text"
                 id="name"
                 name="name"
                 required
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="email"
                 id="email"
                 name="email"
                 required
                 class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
        </div>
        <div>
          <label for="message" class="block text-sm font-medium text-gray-700 mb-1">Message</label>
          <textarea id="message"
                    name="message"
                    rows="4"
                    required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 resize-none"></textarea>
        </div>
        <button type="submit"
                class="w-full bg-blue-600 text-white py-2 px-4 rounded-md text-sm font-medium hover:bg-blue-700 transition duration-200">
          Send Message
        </button>
      </form>
    </div>
  </div>
{% endblock content %}
