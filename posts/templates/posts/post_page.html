{% extends "layout.html" %}
{% block title %}
    {{ post.title }} - Posts
{% endblock title %}
{% block content %}
    <div class="min-h-screen bg-gray-50 pb-16">
        <div class="relative w-full h-[40vh] min-h-[320px] bg-gray-900">
            {% if post.banner %}
                <img src="{{ post.banner.url }}"
                     alt="{{ post.title }}"
                     width="1200"
                     height="480"
                     class="w-full h-full object-cover opacity-80 mix-blend-overlay">
            {% endif %}
            <div class="absolute inset-0 bg-gradient-to-b from-transparent to-gray-900/60"></div>
        </div>
        <div class="relative z-10 max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 -mt-32">
            <article class="bg-white rounded-2xl shadow-xl ring-1 ring-gray-100 overflow-hidden">
                <div class="p-8 sm:p-12">
                    <header class="mb-10 text-center space-y-4">
                        <div class="flex items-center justify-center space-x-2 text-sm font-medium text-blue-600 mb-4">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" />
                            </svg>
                            <time datetime="{{ post.date|date:'c' }}">
                                {{ post.date|date:"F d, Y" }}
                            </time>
                        </div>
                        <h1 class="text-4xl sm:text-5xl font-extrabold text-gray-900 tracking-tight leading-tight">{{ post.title }}</h1>
                    </header>
                    <hr class="border-gray-100 mb-10 w-24 mx-auto border-2 rounded-full">
                    <div class="prose prose-lg sm:prose-xl prose-blue max-w-none text-gray-700 leading-relaxed mx-auto">
                        {{ post.body|safe }}
                    </div>
                </div>
            </article>
            <div class="mt-8 flex justify-center">
                <a href="{% url 'post:list' %}"
                   class="group inline-flex items-center space-x-2 px-6 py-3 bg-white text-gray-700 font-medium rounded-full shadow-sm ring-1 ring-gray-200 hover:bg-gray-50 hover:text-blue-600 transition-all duration-200 ease-in-out">
                    <svg class="w-5 h-5 text-gray-400 group-hover:-translate-x-1 group-hover:text-blue-600 transition-transform duration-200"
                         fill="none"
                         stroke="currentColor"
                         viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    <span>Back to all posts</span>
                </a>
            </div>
        </div>
    </div>
{% endblock content %}
