{% extends "layout.html" %}
{% block title %}
    Create a New Post
{% endblock title %}
{% block content %}
    <h1>Create a New Post</h1>
    <form method="post"
          action="{% url 'post:new-post' %}"
          enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Create Post</button>
    </form>
{% endblock content %}
